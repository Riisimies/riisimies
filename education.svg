<svg width="480" height="260" viewBox="0 0 480 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111318;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7289DA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b6eae;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cardClip2">
      <rect width="480" height="260" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="480" height="260" rx="14" ry="14" fill="url(#cardGrad2)" />

  <!-- Border -->
  <rect width="480" height="260" rx="14" ry="14" fill="none" stroke="#7289DA" stroke-width="1.5" stroke-opacity="0.5" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="480" height="3" rx="0" fill="url(#accentGrad2)" clip-path="url(#cardClip2)" />

  <!-- Left accent line -->
  <rect x="24" y="24" width="3" height="60" rx="2" fill="#7289DA" filter="url(#glow2)" />

  <!-- Title -->
  <text x="38" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#7289DA" letter-spacing="3">EDUCATION &amp; ACCOMPLISHMENTS</text>

  <!-- Section heading -->
  <text x="38" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Academic Background</text>

  <!-- Divider -->
  <line x1="24" y1="90" x2="456" y2="90" stroke="#7289DA" stroke-width="0.5" stroke-opacity="0.3" />

  <!-- Entry 1: Turku AMK -->
  <!-- Dot -->
  <circle cx="36" cy="118" r="5" fill="#7289DA" filter="url(#glow2)" />
  <line x1="36" y1="123" x2="36" y2="163" stroke="#7289DA" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3" />
  <text x="52" y="114" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" font-weight="700" fill="#ffffff">Turku University of Applied Sciences</text>
  <text x="52" y="132" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" fill="#7289DA">ICT Engineer (Insinööri)</text>
  <rect x="340" y="103" width="110" height="18" rx="9" fill="#7289DA" fill-opacity="0.15" />
  <text x="395" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#7289DA" text-anchor="middle" font-weight="600">Currently Studying</text>

  <!-- Entry 2: TAI -->
  <circle cx="36" cy="170" r="5" fill="#7289DA" filter="url(#glow2)" />
  <line x1="36" y1="175" x2="36" y2="213" stroke="#7289DA" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3" />
  <text x="52" y="166" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" font-weight="700" fill="#ffffff">Turun Ammatti-Instituutti</text>
  <text x="52" y="184" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" fill="#7289DA">Software Developer (Ohjelmistokehittäjä)</text>
  <rect x="348" y="155" width="80" height="18" rx="9" fill="#2ecc71" fill-opacity="0.15" />
  <text x="388" y="167" font-family="'Segoe UI', Arial, sans-serif" font-size="10.5" fill="#2ecc71" text-anchor="middle" font-weight="600">Graduated</text>

  <!-- Entry 3: Taitaja -->
  <circle cx="36" cy="222" r="5" fill="#f0c040" filter="url(#glow2)" />
  <text x="52" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" font-weight="700" fill="#ffffff">Taitaja 2025</text>
  <text x="52" y="236" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" fill="#f0c040">🏆  National Skills Competition — Finalist</text>

  <!-- Corner decoration -->
  <circle cx="456" cy="30" r="18" fill="#7289DA" fill-opacity="0.07" />
  <circle cx="456" cy="30" r="10" fill="#7289DA" fill-opacity="0.1" />
</svg>
